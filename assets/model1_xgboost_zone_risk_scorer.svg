<svg width="100%" viewBox="0 0 680 420" role="img" xmlns="http://www.w3.org/2000/svg">
<title>XGBoost Zone Risk Scorer</title>
<desc>Six geographic and behavioral features flow left to right through three XGBoost boosting rounds, producing a zone risk score of 1.25 classified as High.</desc>
<defs>
  <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: system-ui, -apple-system, sans-serif; fill: #1a1a1a; }
    .th { font-size: 12px; font-weight: 600; }
    .ts { font-size: 10px; font-weight: 400; fill: #555; }
    .label { font-size: 11px; fill: #888; }
  </style>
</defs>

<rect x="8" y="10" width="148" height="400" rx="10" fill="#EBF3FB" stroke="#185FA5" stroke-width="0.5" stroke-dasharray="3 3"/>
<text x="82" y="26" text-anchor="middle" class="label" style="fill:#185FA5">input features</text>

<rect x="178" y="10" width="290" height="400" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5" stroke-dasharray="3 3"/>
<text x="323" y="26" text-anchor="middle" class="label" style="fill:#0F6E56">XGBoost boosting rounds</text>

<rect x="490" y="10" width="182" height="400" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5" stroke-dasharray="3 3"/>
<text x="581" y="26" text-anchor="middle" class="label" style="fill:#854F0B">risk output</text>

<rect x="14" y="40" width="136" height="36" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="82" y="55" text-anchor="middle" dominant-baseline="central">road_flood_prone</text>
<text class="ts" x="82" y="68" text-anchor="middle" dominant-baseline="central">flood risk index</text>

<rect x="14" y="88" width="136" height="36" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text class="th" x="82" y="103" text-anchor="middle" dominant-baseline="central">city_peril_multiplier</text>
<text class="ts" x="82" y="116" text-anchor="middle" dominant-baseline="central">metro disruption</text>

<rect x="14" y="136" width="136" height="36" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="82" y="151" text-anchor="middle" dominant-baseline="central" style="fill:#085041">seasonal_disruption</text>
<text class="ts" x="82" y="164" text-anchor="middle" dominant-baseline="central">monsoon / heat idx</text>

<rect x="14" y="184" width="136" height="36" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="82" y="199" text-anchor="middle" dominant-baseline="central" style="fill:#085041">partner_active_days</text>
<text class="ts" x="82" y="212" text-anchor="middle" dominant-baseline="central">tenure signal</text>

<rect x="14" y="232" width="136" height="36" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="82" y="247" text-anchor="middle" dominant-baseline="central" style="fill:#633806">zone_risk_score</text>
<text class="ts" x="82" y="260" text-anchor="middle" dominant-baseline="central">historical loss rate</text>

<rect x="14" y="280" width="136" height="36" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="82" y="295" text-anchor="middle" dominant-baseline="central" style="fill:#633806">riqi_road_index</text>
<text class="ts" x="82" y="308" text-anchor="middle" dominant-baseline="central">road condition</text>

<path d="M150 58 Q164 58 184 110" fill="none" stroke="#378ADD" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#a)" opacity=".7"/>
<path d="M150 106 Q164 106 184 130" fill="none" stroke="#378ADD" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#a)" opacity=".7"/>
<path d="M150 154 Q164 154 184 160" fill="none" stroke="#1D9E75" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#a)" opacity=".7"/>
<path d="M150 202 Q164 202 184 190" fill="none" stroke="#1D9E75" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#a)" opacity=".7"/>
<path d="M150 250 Q164 250 184 220" fill="none" stroke="#BA7517" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#a)" opacity=".7"/>
<path d="M150 298 Q164 298 184 250" fill="none" stroke="#BA7517" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#a)" opacity=".7"/>

<rect x="184" y="80" width="130" height="44" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="249" y="98" text-anchor="middle" dominant-baseline="central" style="fill:#085041">round 1 — base</text>
<text class="ts" x="249" y="114" text-anchor="middle" dominant-baseline="central">n_est=200 · depth=6</text>

<rect x="184" y="160" width="130" height="44" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="249" y="178" text-anchor="middle" dominant-baseline="central" style="fill:#26215C">round 2 — boost</text>
<text class="ts" x="249" y="194" text-anchor="middle" dominant-baseline="central">lr=0.1 · subsample=0.8</text>

<rect x="184" y="240" width="130" height="44" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="249" y="258" text-anchor="middle" dominant-baseline="central" style="fill:#4A1B0C">round 3 — calibrate</text>
<text class="ts" x="249" y="274" text-anchor="middle" dominant-baseline="central">reg_alpha=0.5 · colsample</text>

<path d="M314 262 L340 262 L340 205 L470 205" fill="none" stroke="#D85A30" stroke-width="1.2" marker-end="url(#a)" opacity=".8"/>
<path d="M314 262 L340 262 L340 310 L470 310" fill="none" stroke="#D85A30" stroke-width="1.2" marker-end="url(#a)" opacity=".8"/>

<rect x="470" y="172" width="196" height="68" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text class="th" x="568" y="197" text-anchor="middle" dominant-baseline="central" style="font-size:13px;fill:#501313">risk score: 1.25</text>
<text class="ts" x="568" y="216" text-anchor="middle" dominant-baseline="central">HIGH — above 1.2 threshold</text>
<text class="ts" x="568" y="232" text-anchor="middle" dominant-baseline="central">Mumbai East · Monsoon season</text>

<rect x="470" y="278" width="196" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="568" y="298" text-anchor="middle" dominant-baseline="central" style="fill:#633806">premium: ₹33 / week</text>
<text class="ts" x="568" y="316" text-anchor="middle" dominant-baseline="central">Standard tier · ₹400/day cover</text>

<text x="82" y="390" text-anchor="middle" class="label">6 features</text>
<text x="323" y="390" text-anchor="middle" class="label">3 boosted rounds · 200 estimators</text>
<text x="581" y="390" text-anchor="middle" class="label">score + premium</text>
</svg>
