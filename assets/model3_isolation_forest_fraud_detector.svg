<svg width="100%" viewBox="0 0 680 390" role="img" xmlns="http://www.w3.org/2000/svg">
<title>XGBoost Fraud Anomaly Detector</title>
<desc>Six behavioral and geospatial claim signals pass through an XGBoost anomaly scoring pipeline to produce a fraud probability score. High scores trigger a manual review hold.</desc>
<defs>
  <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: system-ui, -apple-system, sans-serif; fill: #1a1a1a; }
    .th { font-size: 12px; font-weight: 600; }
    .ts { font-size: 10px; font-weight: 400; fill: #555; }
    .label { font-size: 11px; fill: #888; }
  </style>
</defs>

<rect x="8" y="10" width="144" height="362" rx="10" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5" stroke-dasharray="3 3"/>
<text x="80" y="26" text-anchor="middle" class="label" style="fill:#A32D2D">claim signals</text>

<rect x="174" y="10" width="298" height="362" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5" stroke-dasharray="3 3"/>
<text x="323" y="26" text-anchor="middle" class="label" style="fill:#0F6E56">anomaly scoring pipeline</text>

<rect x="494" y="10" width="178" height="362" rx="10" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5" stroke-dasharray="3 3"/>
<text x="583" y="26" text-anchor="middle" class="label" style="fill:#3B6D11">fraud verdict</text>

<rect x="14" y="44" width="132" height="36" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="80" y="59" text-anchor="middle" dominant-baseline="central" style="fill:#4A1B0C">gps_spoof_delta</text>
<text class="ts" x="80" y="72" text-anchor="middle" dominant-baseline="central">location mismatch</text>

<rect x="14" y="92" width="132" height="36" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="80" y="107" text-anchor="middle" dominant-baseline="central" style="fill:#4A1B0C">claim_freq_7d</text>
<text class="ts" x="80" y="120" text-anchor="middle" dominant-baseline="central">claims last 7 days</text>

<rect x="14" y="140" width="132" height="36" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="80" y="155" text-anchor="middle" dominant-baseline="central" style="fill:#633806">weather_claim_match</text>
<text class="ts" x="80" y="168" text-anchor="middle" dominant-baseline="central">event vs archive</text>

<rect x="14" y="188" width="132" height="36" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="80" y="203" text-anchor="middle" dominant-baseline="central" style="fill:#633806">peer_zone_deviation</text>
<text class="ts" x="80" y="216" text-anchor="middle" dominant-baseline="central">vs zone average</text>

<rect x="14" y="236" width="132" height="36" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="80" y="251" text-anchor="middle" dominant-baseline="central" style="fill:#26215C">device_id_change</text>
<text class="ts" x="80" y="264" text-anchor="middle" dominant-baseline="central">identity proxy</text>

<rect x="14" y="284" width="132" height="36" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="80" y="299" text-anchor="middle" dominant-baseline="central" style="fill:#26215C">duplicate_hash</text>
<text class="ts" x="80" y="312" text-anchor="middle" dominant-baseline="central">claim fingerprint</text>

<path d="M146 62  Q160 62  180 110" fill="none" stroke="#D85A30" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#a)" opacity=".7"/>
<path d="M146 110 Q160 110 180 138" fill="none" stroke="#D85A30" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#a)" opacity=".7"/>
<path d="M146 158 Q160 158 180 166" fill="none" stroke="#BA7517" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#a)" opacity=".7"/>
<path d="M146 206 Q160 206 180 194" fill="none" stroke="#BA7517" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#a)" opacity=".7"/>
<path d="M146 254 Q160 254 180 222" fill="none" stroke="#7F77DD" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#a)" opacity=".7"/>
<path d="M146 302 Q160 302 180 250" fill="none" stroke="#7F77DD" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#a)" opacity=".7"/>

<rect x="180" y="80" width="132" height="44" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="th" x="246" y="98" text-anchor="middle" dominant-baseline="central" style="fill:#4A1B0C">stage 1 — isolate</text>
<text class="ts" x="246" y="114" text-anchor="middle" dominant-baseline="central">isolation forest pre-filter</text>

<rect x="180" y="164" width="132" height="44" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th" x="246" y="182" text-anchor="middle" dominant-baseline="central" style="fill:#633806">stage 2 — score</text>
<text class="ts" x="246" y="198" text-anchor="middle" dominant-baseline="central">XGBoost anomaly scorer</text>

<rect x="180" y="248" width="132" height="44" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="246" y="266" text-anchor="middle" dominant-baseline="central" style="fill:#26215C">stage 3 — threshold</text>
<text class="ts" x="246" y="282" text-anchor="middle" dominant-baseline="central">cutoff=0.72 · SHAP explain</text>

<rect x="336" y="44" width="128" height="80" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th" x="400" y="68" text-anchor="middle" dominant-baseline="central" style="fill:#085041">feature importance</text>
<text class="ts" x="400" y="84" text-anchor="middle" dominant-baseline="central">gps_spoof: 0.41</text>
<text class="ts" x="400" y="98" text-anchor="middle" dominant-baseline="central">claim_freq: 0.28</text>
<text class="ts" x="400" y="112" text-anchor="middle" dominant-baseline="central">weather_match: 0.31</text>

<line x1="336" y1="102" x2="360" y2="102" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 2" opacity=".5"/>
<line x1="360" y1="102" x2="360" y2="185" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 2" opacity=".5"/>
<line x1="360" y1="185" x2="336" y2="185" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 2" opacity=".5"/>

<path d="M312 270 L460 270 L460 195" fill="none" stroke="#D85A30" stroke-width="1.2" marker-end="url(#a)" opacity=".8"/>
<path d="M312 270 L460 270 L460 300" fill="none" stroke="#D85A30" stroke-width="1.2" marker-end="url(#a)" opacity=".8"/>

<rect x="494" y="160" width="176" height="56" rx="8" fill="#FCEBEB" stroke="#A32D2D" stroke-width="0.5"/>
<text class="th" x="582" y="181" text-anchor="middle" dominant-baseline="central" style="font-size:13px;fill:#501313">fraud score: 0.87</text>
<text class="ts" x="582" y="200" text-anchor="middle" dominant-baseline="central">HOLD — above 0.72 cutoff</text>

<rect x="494" y="238" width="176" height="56" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text class="th" x="582" y="259" text-anchor="middle" dominant-baseline="central" style="fill:#173404">verdict: manual review</text>
<text class="ts" x="582" y="278" text-anchor="middle" dominant-baseline="central">payout held · alert raised</text>

<text x="80" y="360" text-anchor="middle" class="label">6 behavioral signals</text>
<text x="323" y="360" text-anchor="middle" class="label">3-stage pipeline · SHAP explainability</text>
<text x="583" y="360" text-anchor="middle" class="label">score + verdict</text>
</svg>
